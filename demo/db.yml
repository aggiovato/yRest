_rel:
  todos:
    userId: users

_routes:
  - method: GET
    path: /health
    response:
      status: 200
      body:
        status: ok
        server: yrest
        version: "0.5.0"

  - method: POST
    path: /auth/logout
    response:
      status: 204

  - method: GET
    path: /todos/:id/share
    response:
      status: 200
      body:
        todoId: "{{params.id}}"
        sharedAt: "{{now}}"
        shareToken: "{{uuid}}"
        url: "https://app.example.com/shared/{{params.id}}"

  - method: POST
    path: /auth/login
    handler: login
    response:
      status: 200
      body:
        token: fallback-token

  - method: GET
    path: /stats
    handler: stats
    response:
      status: 200
      body:
        message: handler not loaded

