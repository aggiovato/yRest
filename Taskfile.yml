version: "3"

vars:
  DB_FILE: db.yml
  PKG_NAME: "@aggiovato/yrest"

tasks:
  test:
    desc: Run the test suite
    cmd: npx vitest run

  test:watch:
    desc: Run tests in watch mode
    cmd: npx vitest

  build:
    desc: Build the package (dist/)
    cmd: npx tsup

  serve:dist:
    desc: Start the server from the local dist build
    deps: [build]
    cmd: node dist/cli/index.js serve {{.DB_FILE}}

  dev:
    desc: Watch-build and serve from dist (two parallel processes)
    deps: [build]
    cmds:
      - npx tsup --watch &
      - node dist/cli/index.js serve {{.DB_FILE}}

  serve:npx:
    desc: Start the published npm version via npx (runs from /tmp to avoid self-reference)
    cmd: cd /tmp && npx {{.PKG_NAME}} serve {{.TASKFILE_DIR}}/{{.DB_FILE}}
