version: "3"

vars:
  DB_FILE: db.yml
  PKG_NAME: "@yrest/cli"

tasks:
  # в”Җв”Җ Development в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  test:
    desc: Run the test suite
    cmd: npx vitest run

  test:watch:
    desc: Run tests in watch mode
    cmd: npx vitest

  build:
    desc: Build the package (dist/)
    cmd: npx tsup

  dev:
    desc: Watch-build and serve from dist (two parallel processes)
    deps: [build]
    cmds:
      - npx tsup --watch &
      - node dist/cli/index.js serve {{.DB_FILE}}

  serve:dist:
    desc: Start the server from the local dist build
    deps: [build]
    cmd: node dist/cli/index.js serve {{.DB_FILE}}

  serve:dist:watch:
    desc: Start the server from dist with --watch (reloads db.yml on change)
    deps: [build]
    cmd: node dist/cli/index.js serve {{.DB_FILE}} --watch

  serve:npx:
    desc: Start the published npm version via npx (runs from /tmp to avoid self-reference)
    cmd: cd /tmp && npx {{.PKG_NAME}} serve {{.TASKFILE_DIR}}/{{.DB_FILE}}

  serve:npx:watch:
    desc: Start the published npm version via npx with --watch
    cmd: cd /tmp && npx {{.PKG_NAME}} serve {{.TASKFILE_DIR}}/{{.DB_FILE}} --watch

  lint:
    desc: Check code with ESLint
    cmd: npm run lint

  lint:fix:
    desc: Auto-fix ESLint errors
    cmd: npm run lint:fix

  format:
    desc: Format all files with Prettier
    cmd: npm run format

  format:check:
    desc: Check formatting without writing
    cmd: npm run format:check

  preflight:
    desc: Full pre-push check вҖ” format, lint, typecheck and tests in order
    cmds:
      - task: format:check
      - task: format
      - task: lint
      - task: lint:fix
      - npm run typecheck
      - task: test
      - cmd: |
          printf "\n\033[1;34mв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\033[0m\n"
          printf "\033[1;34mв”Ӯ\033[0m   \033[1;36mвңҰ  yrest В· preflight results  вңҰ\033[0m   \033[1;34mв”Ӯ\033[0m\n"
          printf "\033[1;34mв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\033[0m\n\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mformat:check\033[0m    \033[2mcode style verified\033[0m\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mformat\033[0m          \033[2mfiles formatted\033[0m\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mlint\033[0m            \033[2mno ESLint issues\033[0m\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mlint:fix\033[0m        \033[2mauto-fixes applied\033[0m\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mtypecheck\033[0m       \033[2mTypeScript clean\033[0m\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mtests\033[0m           \033[2mall passed\033[0m\n"
          printf "\n  \033[1;32mвҶ’  All checks passed вҖ” safe to push\033[0m\n\n"
        silent: true

  # в”Җв”Җ Demo в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  demo:
    desc: Build package then start demo вҖ” yrest API on :3070 + Astro dev server on :4321
    deps: [build]
    dir: demo
    cmd: npm start

  demo:stop:
    desc: Kill any processes occupying the demo ports (3070 API + 4321 web)
    cmds:
      - cmd: fuser -k 3070/tcp 2>/dev/null || true
        silent: true
      - cmd: fuser -k 4321/tcp 2>/dev/null || true
        silent: true
      - cmd: echo "Ports 3070 and 4321 released."
        silent: true

  # в”Җв”Җ Release в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  release:patch:
    desc: Bump patch version (x.x.N), commit and tag
    cmd: npm version patch

  release:minor:
    desc: Bump minor version (x.N.0), commit and tag
    cmd: npm version minor

  release:major:
    desc: Bump major version (N.0.0), commit and tag
    cmd: npm version major

  publish:
    desc: Run tests, build and publish to npm (requires npm login)
    cmd: npm publish --access public
