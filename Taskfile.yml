version: "3"

vars:
  DB_FILE: db.yml
  PKG_NAME: "@aggiovato/yrest"

tasks:
  # ── Development ────────────────────────────────────────────────────────────

  test:
    desc: Run the test suite
    cmd: npx vitest run

  test:watch:
    desc: Run tests in watch mode
    cmd: npx vitest

  build:
    desc: Build the package (dist/)
    cmd: npx tsup

  dev:
    desc: Watch-build and serve from dist (two parallel processes)
    deps: [build]
    cmds:
      - npx tsup --watch &
      - node dist/cli/index.js serve {{.DB_FILE}}

  serve:dist:
    desc: Start the server from the local dist build
    deps: [build]
    cmd: node dist/cli/index.js serve {{.DB_FILE}}

  serve:dist:watch:
    desc: Start the server from dist with --watch (reloads db.yml on change)
    deps: [build]
    cmd: node dist/cli/index.js serve {{.DB_FILE}} --watch

  serve:npx:
    desc: Start the published npm version via npx (runs from /tmp to avoid self-reference)
    cmd: cd /tmp && npx {{.PKG_NAME}} serve {{.TASKFILE_DIR}}/{{.DB_FILE}}

  serve:npx:watch:
    desc: Start the published npm version via npx with --watch
    cmd: cd /tmp && npx {{.PKG_NAME}} serve {{.TASKFILE_DIR}}/{{.DB_FILE}} --watch

  lint:
    desc: Check code with ESLint
    cmd: npm run lint

  lint:fix:
    desc: Auto-fix ESLint errors
    cmd: npm run lint:fix

  format:
    desc: Format all files with Prettier
    cmd: npm run format

  format:check:
    desc: Check formatting without writing
    cmd: npm run format:check

  # ── Release ────────────────────────────────────────────────────────────────

  release:patch:
    desc: Bump patch version (x.x.N), commit and tag
    cmd: npm version patch

  release:minor:
    desc: Bump minor version (x.N.0), commit and tag
    cmd: npm version minor

  release:major:
    desc: Bump major version (N.0.0), commit and tag
    cmd: npm version major

  publish:
    desc: Run tests, build and publish to npm (requires npm login)
    cmd: npm publish --access public
