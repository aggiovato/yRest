# yrest development database
# Domain: Team & Project management
# Run: npx @yrest/cli serve db.yml  →  http://localhost:3070
# Docs: GET http://localhost:3070/_about

# ── Relations ─────────────────────────────────────────────────────────────────
#
# DSL quick reference:
#   "m2o:target[carDirect->carInverse]"            level 2 — many2one with cardinality
#   "o2o:target[carDirect->carInverse]"            level 2 — one2one
#   "m2m:target@through(fk,otherKey)[cd->ci]"     many2many via pivot
#   +nested suffix → auto-embed in every GET response

_rel:
  employees:
    departmentId: "m2o:departments[1..1->0..n]+nested"
    profileId: "o2o:profiles[1..1->1..1]"
    projects: "m2m:projects@project_assignments(employeeId,projectId)[0..n->0..n]"

  project_assignments:
    employeeId: "m2o:employees[1..1->1..n]"
    projectId: "m2o:projects[1..1->1..n]"

# ── Schema ────────────────────────────────────────────────────────────────────

_schema:
  employees:
    name: required
    email: { _required: true, _format: email }
    role: required
    departmentId: required
  profiles:
    bio: { _type: string }
    avatarUrl: { _type: string, _format: uri }
  projects:
    name: required
    status: required
  project_assignments:
    employeeId: required
    projectId: required
    assignedRole: required

