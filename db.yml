# yrest development database
# Run: npx @yrest/cli serve db.yml
# Docs: GET http://localhost:3070/_about

_rel:
  # many2one
  posts:
    userId: users
    tags:
      type: many2many
      target: tags
      through: post_tags
      foreignKey: postId
      otherKey: tagId
  comments:
    postId: posts
    userId: users
  reactions:
    postId: posts
    userId: users

  # one2one
  profiles:
    userId:
      type: one2one
      target: users

_routes:
  # ── Auth ────────────────────────────────────────────────────────────────────

  - method: POST
    path: /auth/login
    scenarios:
      - when:
          body.email: admin@example.com
          body.password: secret
        response:
          status: 200
          body:
            token: tok-admin-abc123
            role: admin
            userId: 1
      - when:
          body.email: ana@example.com
          body.password: secret
        response:
          status: 200
          body:
            token: tok-ana-xyz789
            role: author
            userId: 2
      - when:
          - body.role: admin
          - body.role: moderator
        response:
          status: 200
          body:
            token: tok-elevated-000
            role: "{{body.role}}"
    otherwise:
      status: 401
      body:
        error: Invalid credentials

  - method: POST
    path: /auth/logout
    response:
      status: 204

  - method: GET
    path: /auth/me
    response:
      status: 200
      body:
        id: 1
        name: Admin User
        role: admin
        email: admin@example.com

  # ── Posts ───────────────────────────────────────────────────────────────────

  - method: POST
    path: /posts/:id/publish
    delay: 300
    scenarios:
      - when:
          params.id: "99"
        response:
          status: 404
          body:
            error: Post not found
    otherwise:
      status: 200
      body:
        postId: "{{params.id}}"
        status: published
        publishedAt: "{{now}}"

  - method: GET
    path: /posts/:id/preview
    response:
      status: 200
      body:
        postId: "{{params.id}}"
        previewUrl: "/posts/{{params.id}}/preview"
        generatedAt: "{{now}}"
        token: "{{uuid}}"

  # ── Stats & System ───────────────────────────────────────────────────────────

  - method: GET
    path: /stats
    response:
      status: 200
      headers:
        Cache-Control: no-store
      body:
        users: 5
        posts: 6
        comments: 8
        reactions: 7
        tags: 6

  - method: GET
    path: /health
    response:
      status: 200
      body:
        status: ok
        uptime: 3600
        timestamp: "{{now}}"

  # ── Simulate errors ──────────────────────────────────────────────────────────

  - method: GET
    path: /admin/reports
    error: 503
    errorBody:
      message: Reporting service temporarily unavailable
      retryAfter: 60

  - method: DELETE
    path: /admin/reset
    error: 403
    errorBody:
      message: Forbidden — this operation is disabled in mock mode

# ── Collections ──────────────────────────────────────────────────────────────

